<!DOCTYPE html>
<!-- Minimal dashboard stub (task 1.5 — full UI comes later).
     Polls /status and shows TRUSTED (green) / COMPROMISED (red)
     plus any failing measurement entries. -->
<html>
<head>
<meta charset="utf-8">
<title>Attestation Dashboard</title>
<style>
  body { font-family: sans-serif; margin: 2rem; }
  #verdict { font-size: 2.5rem; font-weight: bold; padding: 1rem; border-radius: 8px; display: inline-block; }
  .TRUSTED { background: #1a7f37; color: white; }
  .COMPROMISED { background: #cf222e; color: white; }
  .UNKNOWN { background: #6e7781; color: white; }
  pre { background: #f6f8fa; padding: 1rem; border-radius: 6px; overflow-x: auto; }
</style>
</head>
<body>
  <h1>Device Integrity</h1>
  <div id="verdict" class="UNKNOWN">UNKNOWN</div>
  <h2>Details</h2>
  <pre id="details">waiting for first attestation…</pre>
<script>
async function refresh() {
  try {
    const r = await fetch('/status');
    const s = await r.json();
    const v = document.getElementById('verdict');
    v.textContent = s.verdict;
    v.className = s.verdict;
    document.getElementById('details').textContent = JSON.stringify(s, null, 2);
  } catch (e) { /* verifier restarting; keep last state */ }
}
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
